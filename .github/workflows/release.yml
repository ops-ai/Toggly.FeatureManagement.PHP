name: PHP SDK - Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'publish = use manifest version; auto_bump = legacy CI bump'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - auto_bump
      bump_type:
        description: 'Bump type (only used when release_mode is auto_bump)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      action: ${{ steps.release.outputs.action }}
      reason: ${{ steps.release.outputs.reason }}
      manifest_version: ${{ steps.release.outputs.manifest_version }}
      registry_latest: ${{ steps.release.outputs.registry_latest }}
      manifest_changed: ${{ steps.release.outputs.manifest_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        uses: ./.github/actions/resolve-release-version
        with:
          manifest_path: composer.json
          registry: packagist
          package_name: toggly/feature-management-php
          release_mode: ${{ github.event.inputs.release_mode || 'publish' }}
          bump_type: ${{ github.event.inputs.bump_type || 'patch' }}

  build-and-test:
    needs: validate
    if: needs.validate.outputs.action == 'publish'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
        continue-on-error: true

  release:
    needs: [build-and-test, validate]
    if: needs.validate.outputs.action == 'publish'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Configure git
        run: |
          git config user.name "${{ steps.import_gpg.outputs.name }}"
          git config user.email "${{ steps.import_gpg.outputs.email }}"

      - name: Commit version bump
        if: needs.validate.outputs.manifest_changed == 'true'
        run: |
          git add composer.json
          git commit -S -m "Bumped PHP SDK to v${{ needs.validate.outputs.version }} (auto_bump) [skip ci]"

          MAX_RETRIES=3
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git pull --rebase --autostash origin main; then
              if git push origin main; then
                echo "Successfully pushed version bump"
                exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              sleep 2
            fi
          done

          echo "Failed to push after $MAX_RETRIES attempts"
          exit 1

      - name: Create and push tag
        run: |
          git tag -s -m "v${{ needs.validate.outputs.version }}" "v${{ needs.validate.outputs.version }}"
          git push origin "v${{ needs.validate.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body: |
            ## PHP SDK v${{ needs.validate.outputs.version }}

            ### Installation

            ```bash
            composer require toggly/feature-management-php
            ```

            ### Features

            - PHP 7.4–8.3 support
            - Laravel service provider integration
            - WordPress integration
            - PSR-compatible interfaces (HTTP client, cache, logging)

            ### Requirements

            - PHP ^7.4 | ^8.0 | ^8.1 | ^8.2 | ^8.3

            ### Links

            - [Packagist](https://packagist.org/packages/toggly/feature-management-php)
            - [Documentation](https://docs.toggly.io/docs/sdks/php)
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [release, validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## PHP SDK Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.validate.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.validate.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest | ${{ needs.validate.outputs.manifest_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry latest | ${{ needs.validate.outputs.registry_latest || 'none' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release mode | ${{ github.event.inputs.release_mode || 'publish' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ needs.validate.outputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | v${{ needs.validate.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | toggly/feature-management-php |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-release | ${{ github.event.inputs.prerelease }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Packagist auto-updates from GitHub tags via webhook." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on Packagist](https://packagist.org/packages/toggly/feature-management-php)" >> $GITHUB_STEP_SUMMARY
