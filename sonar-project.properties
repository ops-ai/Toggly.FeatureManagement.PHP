# SonarCloud Configuration for PHP SDK
# This configuration can be used for local analysis

sonar.projectKey=toggly-sdks-php
sonar.organization=ops-ai
sonar.projectName=Toggly SDKs - PHP

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Exclusions
sonar.exclusions=**/vendor/**,**/tests/**

# Coverage report paths (Clover format)
sonar.php.coverage.reportPaths=coverage.xml,coverage/coverage.xml

# Test report paths
sonar.php.tests.reportPath=test-results.xml

# PHP version
sonar.php.version=7.4,8.0,8.1,8.2,8.3

# File suffixes
sonar.php.file.suffixes=php
