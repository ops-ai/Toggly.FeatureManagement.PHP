name: PHP SDK - Tests & Analysis

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
          tools: composer:v2
          extensions: mbstring, xml, ctype, json, mongodb

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php-version }}-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction --prefer-stable

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check code style
        run: |
          if [ -f "vendor/bin/phpcs" ]; then
            vendor/bin/phpcs --standard=PSR12 src/ || echo "Code style check completed with warnings"
          else
            echo "PHP_CodeSniffer not installed, skipping code style check"
          fi
        continue-on-error: true

      - name: Run PHPUnit tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=test-results.xml --coverage-text

      - name: Upload coverage (PHP 8.3 only)
        if: matrix.php-version == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: |
            coverage.xml
            test-results.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-php-${{ matrix.php-version }}
          path: "*.xml"
          retention-days: 7
          if-no-files-found: ignore

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: mbstring, xml, ctype, json, openssl, curl

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction --prefer-stable

      - name: Run smoke tests
        timeout-minutes: 2
        env:
          TOGGLY_SMOKE_APP_KEY_BACKEND: ${{ secrets.TOGGLY_SMOKE_APP_KEY_BACKEND }}
        run: vendor/bin/phpunit --filter SmokeTest

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test, dependency-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: php-coverage
          path: coverage/
        continue-on-error: true

      - name: List coverage files
        run: |
          echo "Coverage files:"
          find coverage -type f || echo "No coverage files found"

      - name: Normalize paths in test results
        run: |
          if [ -f "coverage/test-results.xml" ]; then
            sed -i "s|${GITHUB_WORKSPACE}/||g" coverage/test-results.xml
            echo "Paths normalized in test-results.xml"
          else
            echo "test-results.xml not found, skipping normalization"
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=toggly-sdks-php
            -Dsonar.organization=ops-ai
            -Dsonar.projectName="Toggly SDKs - PHP"
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/vendor/**
            -Dsonar.php.coverage.reportPaths=coverage/coverage.xml
            -Dsonar.php.tests.reportPath=coverage/test-results.xml
        continue-on-error: true

      - name: Download Dependency Check report (for SonarQube Server)
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-report-php
          path: dependency-check-reports/
        continue-on-error: true

      - name: SonarQube Server Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_SERVER_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=toggly-sdks-php
            -Dsonar.projectName="Toggly SDKs - PHP"
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/vendor/**
            -Dsonar.php.coverage.reportPaths=coverage/coverage.xml
            -Dsonar.php.tests.reportPath=coverage/test-results.xml
            -Dsonar.dependencyCheck.reportPath=dependency-check-reports/dependency-check-report.xml
        continue-on-error: true

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache OWASP Dependency Check database
        uses: actions/cache@v4
        with:
          path: /home/runner/OWASP-Dependency-Check/data/
          key: dependency-check-db-${{ runner.os }}-v6
          restore-keys: |
            dependency-check-db-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'toggly-sdks-php'
          path: '.'
          format: 'ALL'
          args: >-
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --enableExperimental
            --disableAssembly
            --disableRubygems
            --disableBundleAudit
            --disableNodeJS
            --disableNodeAudit
            --disablePyPkg
            --disablePyDist
        continue-on-error: true

      - name: Upload Dependency Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report-php
          path: reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
        continue-on-error: true

  summary:
    name: Analysis Summary
    runs-on: ubuntu-latest
    needs: [test, smoke-test, sonar, dependency-check]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## PHP SDK Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Analysis workflow completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PHP Versions Tested" >> $GITHUB_STEP_SUMMARY
          echo "- PHP 8.2" >> $GITHUB_STEP_SUMMARY
          echo "- PHP 8.3" >> $GITHUB_STEP_SUMMARY
          echo "- PHP 8.4" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Components Tested" >> $GITHUB_STEP_SUMMARY
          echo "- Core Feature Management SDK" >> $GITHUB_STEP_SUMMARY
          echo "- Laravel Integration" >> $GITHUB_STEP_SUMMARY
          echo "- WordPress Integration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check SonarCloud for detailed results: https://sonarcloud.io/project/overview?id=toggly-sdks-php" >> $GITHUB_STEP_SUMMARY
          echo "Check SonarQube Server for detailed results: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=toggly-sdks-php" >> $GITHUB_STEP_SUMMARY
